<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumivox Studios | Zero-Gravity 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: 1; }
        .overlay { position: relative; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>

    <div id="canvas-bg"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-bg').appendChild(renderer.domElement);

        // Zero-G Floating Particle Field (Mirroring your video aesthetic)
        const geometry = new THREE.BufferGeometry();
        const positions = [];
        for(let i=0; i<2000; i++) {
            positions.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.1, color: 0x00f2ff }));
        scene.add(particles);

        // Central 3D Floating "Core" (Representing Lumivox Studios)
        const coreGeo = new THREE.IcosahedronGeometry(3, 1);
        const coreMat = new THREE.MeshPhongMaterial({ color: 0xd4af37, wireframe: true });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        const light = new THREE.PointLight(0xffffff, 2);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 20;

        function animate() {
            requestAnimationFrame(animate);
            // Zero-Gravity rotational movement
            particles.rotation.y += 0.0005;
            core.rotation.y += 0.005;
            core.rotation.z += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
